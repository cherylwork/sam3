name: SAM3 Config for TubeletGraph

paths:
  intermdir: ./_interm_out
  outdir: ./_pred_out
  visdir: ./_vis_out
  evaldir: ./_quant_out

datasets:
  vost:
    name: vost
    data_dir: <ADD/YOUR/PATH>/VOST
    image_dir: <ADD/YOUR/PATH>/VOST/JPEGImages
    anno_dir: <ADD/YOUR/PATH>/VOST/Annotations
    split_dir: ./splits/vost
    image_format: "frame*.jpg"
    anno_format:  "frame*.png"
    fps: 5
  vscos:
    name: vscos
    data_dir: <ADD/YOUR/PATH>/VSCOS
    image_dir: <ADD/YOUR/PATH>/VSCOS/JPEGImages
    anno_dir: <ADD/YOUR/PATH>/VSCOS/Annotations
    split_dir: ./splits/vscos
    image_format: "frame_*.jpg"
    anno_format:  "frame_*.png"
    fps: 60
  m3vos:
    name: m3vos
    data_dir: <ADD/YOUR/PATH>/M3VOS
    image_dir: <ADD/YOUR/PATH>/M3VOS/JPEGImages
    anno_dir: <ADD/YOUR/PATH>/M3VOS/Annotations
    split_dir: ./splits/m3vos
    image_format: "*.jpg"
    anno_format: "*.png"
    fps: 30
  davis:
    name: davis
    data_dir: <ADD/YOUR/PATH>/DAVIS17_480p
    image_dir: <ADD/YOUR/PATH>/DAVIS17_480p/JPEGImages
    anno_dir: <ADD/YOUR/PATH>/DAVIS17_480p/Annotations
    split_dir: ./splits/davis
    image_format: "*.jpg"
    anno_format: "*.png"
    fps: 24
  custom:
    name: custom
    data_dir: ./_custom_dataset
    image_dir: ./_custom_dataset/JPEGImages
    anno_dir: ./_custom_dataset/Annotations
    split_dir: ./splits/custom
    image_format: ""
    anno_format: ""
    fps: 30

entity_seg:
  cropformer:
    project_path: ./thirdparty/detectron2/projects/CropFormer
    config_path: ./thirdparty/detectron2/projects/CropFormer/configs/entityv2/entity_segmentation/cropformer_hornet_3x.yaml
    opts: ['MODEL.WEIGHTS', './_ckpts/CropFormer_hornet_3x_03823a.pth']
    confidence_threshold: 0.5
  sam_automask:
    model_weights: ./_ckpts/sam2.1_hiera_large.pt
    config: configs/sam2.1/sam2.1_hiera_l.yaml
    kwargs:
      points_per_side: 32
      points_per_batch: 64
      pred_iou_thresh: 0.75
      stability_score_thresh: 0.95
      stability_score_offset: 1.0
      mask_threshold: 0.0

tubelet:
  entity_method: cropformer
  tracker:
    name: SAM3
    module: SAM3
    model_weights: null
    bpe_path: null
    device: cuda
    multi_mask: False
    strict_state_dict_loading: True
    apply_temporal_disambiguation: True
    compile: False
  init_entity_thrd: 0.0005
  fill_entity_thrd: 0.0016
  fill_coverage_thrd: 0.25
  rm_init_entity_thrd: 0.75
  collect_spacing: 30
  prox_tracker:
    name: SAM3
    module: SAM3
    model_weights: null
    bpe_path: null
    device: cuda
    multi_mask: True
    multi_mask_fallback: morphology
    strict_state_dict_loading: True
    apply_temporal_disambiguation: True
    compile: False

sem_sim:
  name: fcclip
  project_path: ./thirdparty/fc-clip
  config_path: ./thirdparty/fc-clip/configs/coco/panoptic-segmentation/fcclip/fcclip_convnext_large_eval_ade20k.yaml
  opts: ['MODEL.WEIGHTS', './_ckpts/fcclip_cocopan.pth']

methods:
  Ours:
    name: Ours
    module: TubeletGraph
    tubelet_dirname: "tubelets_{}_cropformer_fcclip"
    thrds:
      mm_cover: 0.3
      clip_sim_max: 0.7
  Ours_abl_prox:
    name: Ours_abl_prox
    module: TubeletGraph
    tubelet_dirname: "tubelets_{}_cropformer_fcclip"
    thrds:
      mm_cover: -1.0
      clip_sim_max: 0.7
  Ours_abl_sem:
    name: Ours_abl_sem
    module: TubeletGraph
    tubelet_dirname: "tubelets_{}_cropformer_fcclip"
    thrds:
      mm_cover: 0.3
      clip_sim_max: -1.0
  Ours_abl_both:
    name: Ours_abl_both
    module: TubeletGraph
    tubelet_dirname: "tubelets_{}_cropformer_fcclip"
    thrds:
      mm_cover: -1.0
      clip_sim_max: -1.0

vlm:
  model_name: gpt-4.1
  init_color_rgb: [245, 0, 150]
  init_color_name: pink
  query_color_rgb: [0, 245, 245]
  query_color_name: cyan-blue

eval:
  obj_id: '0'
  skip_first_frame: True
  temploc_max_pad: 0
